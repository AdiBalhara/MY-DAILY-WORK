<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fraud Detection Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
padding:25px;
text-align:center;
font-size:28px;
font-weight:600;
}

.container{
max-width:900px;
margin:40px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#243b55;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1a2c40;
}

.result{
text-align:center;
font-size:20px;
padding:20px;
border-radius:8px;
margin-top:20px;
}

.safe{
background:#e8f8f1;
color:#1e8449;
}

.fraud{
background:#fdecea;
color:#c0392b;
}

.loader{
border:5px solid #f3f3f3;
border-top:5px solid #243b55;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.footer{
text-align:center;
margin-top:30px;
color:#777;
}

</style>
</head>

<body>

<header>
Credit Card Fraud Detection System
</header>

<div class="container">

<div class="card">

<h2>Transaction Details</h2>

<input type="number" id="amt" placeholder="Transaction Amount">

<input type="number" id="city_pop" placeholder="City Population">

<input type="number" id="lat" placeholder="Latitude">

<input type="number" id="long" placeholder="Longitude">

<button onclick="predict()">Analyze Transaction</button>

</div>

<div class="card">

<h2>Prediction Result</h2>

<div class="loader" id="loader"></div>

<div id="result"></div>

</div>

</div>

<div class="footer">
Fraud Detection AI System
</div>

<script>

async function predict(){

const loader=document.getElementById("loader")
const resultDiv=document.getElementById("result")

loader.style.display="block"
resultDiv.innerHTML=""

const data={
amt:parseFloat(document.getElementById("amt").value),
city_pop:parseFloat(document.getElementById("city_pop").value),
lat:parseFloat(document.getElementById("lat").value),
long:parseFloat(document.getElementById("long").value)
}

try{

const response=await fetch("http://127.0.0.1:8000/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

const result=await response.json()

loader.style.display="none"

if(result.label==="Fraud"){

resultDiv.className="result fraud"

}else{

resultDiv.className="result safe"

}

resultDiv.innerHTML=
"Prediction: "+result.label+
"<br><br>Fraud Probability: "+
result.fraud_probability.toFixed(3)

}

catch(error){

loader.style.display="none"

resultDiv.innerHTML="API connection error"

}

}

</script>

</body>
</html>
